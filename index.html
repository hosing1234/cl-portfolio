<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lee Ho Sing Cyrus — Full Stack Web Developer Portfolio">
  <meta name="theme-color" content="#f8f8f8">
  <title>Lee Ho Sing Cyrus — Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
  <div class="intro-screen" id="intro-screen" aria-hidden="true">
    <div class="intro-lines" id="intro-lines"></div>
  </div>

  <div class="app-shell" id="app-shell">
    <aside class="left-panel" id="left-panel" aria-label="Portfolio identity">
      <div class="left-panel-default" id="left-panel-default">
        <p class="panel-label">Portfolio</p>
        <p class="panel-name-light">Lee Ho Sing</p>
        <p class="panel-name-strong">Cyrus</p>
      </div>
      <div class="left-panel-hover hidden" id="left-panel-hover">
        <p class="panel-label" id="left-panel-section"></p>
        <ul class="panel-bullets" id="left-panel-bullets"></ul>
      </div>
    </aside>

    <main class="content-scroll styled-scrollbar" id="content-scroll">
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle light/dark mode" aria-pressed="false">Dark</button>
      <section id="about" class="content-section" data-section="About">
        <p class="section-index">01 / About</p>
        <div class="about-header">
          <h2 class="about-name" id="about-name"></h2>
          <p class="about-role" id="about-role"></p>
          <p class="about-subhead" id="about-subhead"></p>
        </div>
        <div class="about-intro" id="about-text"></div>
        <button type="button" class="know-more-btn" id="know-more-btn">Know more</button>
      </section>

      <section id="ai-era" class="content-section" data-section="AI Era">
        <p class="section-index" id="ai-era-index">02 / AI Era</p>
        <div class="about-header">
          <h2 class="about-subhead" id="ai-era-title"></h2>
          <p class="about-role" id="ai-era-kicker"></p>
        </div>
        <div class="ai-era-body" id="ai-era-body"></div>
      </section>

      <section id="work" class="content-section work-section" data-section="Work">
        <p class="section-index">03 / Work</p>
        <h2 class="section-headline work-headline">Experience<br>&amp; projects</h2>
        <div class="timeline" id="timeline"></div>
      </section>

      <section id="skills" class="content-section" data-section="Skills">
        <p class="section-index">04 / Skills</p>
        <div class="skills-grid" id="skills-grid"></div>
      </section>

      <section id="contact" class="content-section" data-section="Contact">
        <p class="section-index">05 / Contact</p>
        <h2 class="section-headline contact-headline">Let's build<br>something.</h2>
        <div class="contact-list" id="contact-list"></div>
      </section>
    </main>

    <aside class="sidebar" id="sidebar">
      <nav class="right-nav" id="right-nav" aria-label="Section navigation">
        <div class="right-nav-line" id="right-nav-line"></div>
        <div class="right-nav-links" id="right-nav-links"></div>
      </nav>

      <aside class="rail" id="rail" aria-label="Section menu">
        <div class="rail-line rail-line-top"></div>
        <button class="rail-toggle" id="rail-toggle" aria-label="Toggle section menu" aria-expanded="false">
          <span class="rail-icon-open" aria-hidden="true">
            <span></span><span></span><span></span>
          </span>
          <span class="rail-icon-close hidden" aria-hidden="true">×</span>
        </button>
        <div class="rail-line rail-line-bottom"></div>
      </aside>
    </aside>
  </div>

  <div class="know-more-panel" id="know-more-panel" aria-hidden="true" inert>
    <div class="know-more-inner styled-scrollbar">
      <div class="know-more-header">
        <p class="know-more-label" id="know-more-label">About</p>
        <button type="button" class="know-more-close" id="know-more-close" aria-label="Close">Close</button>
      </div>
      <div class="know-more-content" id="know-more-content"></div>
    </div>
  </div>

  <div class="work-panel" id="work-panel" aria-hidden="true" inert>
    <button type="button" class="work-panel-nav work-panel-nav--prev" id="work-panel-prev" aria-label="Previous project" disabled>←</button>
    <div class="work-panel-inner styled-scrollbar" id="work-panel-inner">
      <div class="work-panel-header">
        <p class="work-panel-label" id="work-panel-label">Project</p>
        <button type="button" class="work-panel-close" id="work-panel-close" aria-label="Close">Close</button>
      </div>
      <div class="work-panel-content" id="work-panel-content"></div>
    </div>
    <button type="button" class="work-panel-nav work-panel-nav--next" id="work-panel-next" aria-label="Next project" disabled>→</button>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
