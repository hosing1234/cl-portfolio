<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lee Ho Sing Cyrus — Full Stack Web Developer Portfolio">
  <meta name="theme-color" content="#ffffff">
  <title>Lee Ho Sing Cyrus — Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="intro-screen" id="intro-screen" aria-hidden="true">
    <div class="intro-type" id="intro-type"></div>
  </div>

  <aside class="rail-menu" id="rail-menu" aria-label="Section navigation">
    <button class="rail-toggle" id="rail-toggle" aria-label="Open section menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="rail-panel" id="rail-panel"></nav>
  </aside>

  <header class="header">
    <nav class="nav container">
      <a href="#" class="nav-logo">CL</a>
      <ul class="nav-links" id="nav-links"></ul>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </nav>
  </header>

  <main>
    <section id="hero" class="hero section">
      <div class="hero-shell">
        <div class="hero-copy">
          <p class="hero-greeting">Portfolio / Full Stack Web Developer</p>
          <h1 class="hero-name" id="hero-name"></h1>
          <p class="hero-title" id="hero-title"></p>
          <p class="hero-tagline" id="hero-tagline"></p>
          <div class="hero-preview" id="hero-preview"></div>
          <div class="hero-cta" id="hero-cta"></div>
        </div>
        <nav class="hero-menu" id="hero-menu" aria-label="Portfolio sections"></nav>
      </div>
    </section>

    <section id="about" class="section">
      <div class="container">
        <h2 class="section-title">About</h2>
        <p class="about-text" id="about-text"></p>
        <ul class="about-highlights" id="about-highlights"></ul>
      </div>
    </section>

    <section id="skills" class="section section-alt">
      <div class="container">
        <h2 class="section-title">Skills</h2>
        <div class="skills-grid" id="skills-grid"></div>
      </div>
    </section>

    <section id="experience" class="section">
      <div class="container">
        <h2 class="section-title">Experience</h2>
        <div class="timeline" id="experience-list"></div>
      </div>
    </section>

    <section id="projects" class="section section-alt">
      <div class="container">
        <h2 class="section-title">Projects</h2>
        <div class="projects-grid" id="projects-grid"></div>
      </div>
    </section>

    <section id="education" class="section">
      <div class="container">
        <h2 class="section-title">Education</h2>
        <div class="education-list" id="education-list"></div>
      </div>
    </section>

    <section id="contact" class="section section-alt">
      <div class="container">
        <h2 class="section-title">Contact</h2>
        <div class="contact-content" id="contact-content"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p id="footer-text"></p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
