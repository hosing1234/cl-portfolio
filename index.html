<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cyrus Lee — Software Developer Portfolio">
  <title>Cyrus Lee — Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <nav class="nav container">
      <a href="#" class="nav-logo">CL</a>
      <ul class="nav-links" id="nav-links"></ul>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </nav>
  </header>

  <main>
    <section id="hero" class="hero section">
      <div class="container hero-content">
        <p class="hero-greeting">Hi, I'm</p>
        <h1 class="hero-name" id="hero-name"></h1>
        <p class="hero-title" id="hero-title"></p>
        <p class="hero-tagline" id="hero-tagline"></p>
        <div class="hero-cta" id="hero-cta"></div>
      </div>
    </section>

    <section id="about" class="section">
      <div class="container">
        <h2 class="section-title">About</h2>
        <p class="about-text" id="about-text"></p>
        <ul class="about-highlights" id="about-highlights"></ul>
      </div>
    </section>

    <section id="skills" class="section section-alt">
      <div class="container">
        <h2 class="section-title">Skills</h2>
        <div class="skills-grid" id="skills-grid"></div>
      </div>
    </section>

    <section id="experience" class="section">
      <div class="container">
        <h2 class="section-title">Experience</h2>
        <div class="timeline" id="experience-list"></div>
      </div>
    </section>

    <section id="projects" class="section section-alt">
      <div class="container">
        <h2 class="section-title">Projects</h2>
        <div class="projects-grid" id="projects-grid"></div>
      </div>
    </section>

    <section id="education" class="section">
      <div class="container">
        <h2 class="section-title">Education</h2>
        <div class="education-list" id="education-list"></div>
      </div>
    </section>

    <section id="contact" class="section section-alt">
      <div class="container">
        <h2 class="section-title">Contact</h2>
        <div class="contact-content" id="contact-content"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p id="footer-text"></p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
